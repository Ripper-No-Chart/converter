<div class="container">
  <div class="converter-container">
    <h1>Converter</h1>

    <table class="conversion-table">
      <tbody>
        <tr>
          <td>
            <label for="currency" class="form-label">Currency</label>
            <select
              id="currency"
              [(ngModel)]="selectedCurrency"
              (change)="setInputFocus(); resetValues()"
              class="form-select"
            >
              <option
                *ngFor="let currency of ['USD', 'ARS', 'MXN']"
                [value]="currency"
              >
                {{ currency }}
              </option>
            </select>
          </td>
          <td>
            <label for="amount" class="form-label">Amount</label>
            <input
              #amount
              type="number"
              id="amount"
              [(ngModel)]="input"
              class="form-control"
              (focus)="setInputFocus()"
              [disabled]="!selectedCurrency"
            />
          </td>
        </tr>

        <ng-container *ngFor="let currency of currencies">
          <tr *ngIf="selectedCurrency !== currency">
            <td>
              <h5>{{ currency }}:</h5>
            </td>
            <td>
              <h5>{{ conversionResults[currency] | number : "1.2-2" }}</h5>
            </td>
          </tr>
        </ng-container>
      </tbody>
    </table>

    <button
      (click)="convertCurrency()"
      class="btn btn-primary"
      [disabled]="input <= 0 || !selectedCurrency"
    >
      Convert
    </button>

    <hr />

    <div class="footer">
      <h6>RipperNoChart - 2024</h6>
    </div>
  </div>
</div>
